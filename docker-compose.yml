services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: url_shortener
    volumes:
      - pgdata:/var/lib/postgresql/data

  httpserver:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config/prod.yaml
    ports:
      - "8082:8082"
    depends_on:
      - postgres

volumes:
  pgdata:
