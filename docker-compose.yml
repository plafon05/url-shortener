services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: url_shortener_user
      POSTGRES_PASSWORD: "1230"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U url_shortener_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  httpserver:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config/prod.yaml
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
